# ============================================================
# Crom API v2 — 按标题查询页面
# Endpoint: https://apiv2.crom.avn.sh/graphql
# ============================================================

# ----------------------------------------------------------
# 示例 1：精确匹配标题（大小写不敏感）
# ----------------------------------------------------------
query GetPageByTitleExact {
  pages(
    filter: {
      onWikidotPage: {
        title: { eqLower: "scp-cn-001" }
      }
    }
    first: 5
  ) {
    edges {
      node {
        url
        ... on WikidotPage {
          title
          rating
          voteCount
          category
          tags
          createdAt
          createdBy {
            displayName
          }
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
    }
  }
}

