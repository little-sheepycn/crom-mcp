# ============================================================
# Crom API v2 — 按写手查询文章
# Endpoint: https://apiv2.crom.avn.sh/graphql
# ============================================================

# ----------------------------------------------------------
# 示例 1：按作者名查询 — 基本版
# 查找某个作者的所有文章（跨全站）
# ----------------------------------------------------------
query GetPagesByAuthor {
  pages(
    filter: {
      attributions: {
        type: { eq: AUTHOR }
        user: { displayName: { eqLower: "你的作者名" } }
      }
    }
    sort: { key: WIKIDOT_RATING, order: DESC }
    first: 20
  ) {
    edges {
      node {
        url
        attributions {
          type
          user {
            ... on WikidotUser {
              displayName
            }
          }
        }
        ... on WikidotPage {
          title
          rating
          voteCount
          createdAt
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

